services:
  iris-mus:
    init: true
    container_name: iris-mus
    build:
      context: .
      dockerfile: iris/Dockerfile
    ports:
      - 52774:52773
      - 51774:1972
    volumes:
      - ./iris/shared:/iris-shared
    environment:
      - ISC_DATA_DIRECTORY=/iris-shared/durable
    command: --check-caps false --ISCAgent false

  webgateway:
    init: true
    container_name: webgateway
    build:
      context: .
      dockerfile: webgateway/Dockerfile
    hostname: webgateway
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      - ISC_DATA_DIRECTORY=/webgateway-shared/durable
      - ISC_CSP_CONF_FILE=/webgateway-shared/CSP.conf
      - ISC_CSP_INI_FILE=/webgateway-shared/CSP.ini
    volumes:
      - ./webgateway/shared:/webgateway-shared
    depends_on:
      - iris-mus

  mus-frontend:
    init: true
    container_name: mus-frontend
    build:
      context: ./mus-frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - webgateway
    restart: unless-stopped

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: qwen3-4b-agent
    ports:
      - "8000:8000"
    volumes:
      - ./models:/models:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    command:
      [
        "--host", "0.0.0.0",
        "--port", "8000",
        "--no-mmap",
        "-m", "/models/Qwen3-4B-Instruct-2507-Q4_K_M.gguf",
        "-c", "8192",
        "-ngl", "999",
        "-t", "12",
        "--temp", "0.2"
      ]
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]
    restart: unless-stopped